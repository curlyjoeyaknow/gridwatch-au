name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests (offline; captured API fixture, real file round-trips)
        run: pytest -q

  decision-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Guard self-test
        run: python3 tools/check_decision_hygiene.py --selftest
      - name: Changelog discipline (PRs)
        if: github.event_name == 'pull_request'
        run: python3 tools/check_decision_hygiene.py --against ${{ github.event.pull_request.base.sha }}
